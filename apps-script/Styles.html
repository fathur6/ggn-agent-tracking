<style>
:root {
  --canvas: #ffffff;
  --primary: #17171c;
  --on-primary: #ffffff;
  --ink: #212121;
  --muted: #93939f;
  --slate: #75758a;
  --hairline: #d9d9dd;
  --border-light: #e5e7eb;
  --soft-stone: #eeece7;
  --deep-green: #003c33;
  --coral: #ff7759;
  --action-blue: #1863dc;
  --focus-blue: #4c6ee6;
  --error: #b30000;
  --surface: #ffffff;
  --surface2: var(--soft-stone);
  --text: var(--ink);
  --text2: var(--muted);
  --radius-xs: 4px;
  --radius-sm: 8px;
  --radius-md: 16px;
  --radius-lg: 22px;
  --radius-pill: 32px;
  --font-body: -apple-system, BlinkMacSystemFont, 'Inter', 'Arial', ui-sans-serif, system-ui;
  --font-mono: 'CohereMono', ui-monospace, monospace;
}

[data-theme="dark"] {
  --canvas: #17171c;
  --surface: #212121;
  --surface2: #2a2a2a;
  --text: #e8e8e8;
  --text2: #93939f;
  --ink: #e8e8e8;
  --hairline: #333333;
  --border-light: #333333;
  --soft-stone: #2a2a2a;
  --primary: #ffffff;
  --on-primary: #17171c;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.5;
  background: var(--canvas);
  color: var(--text);
  min-height: 100vh;
}

.app { display: flex; min-height: 100vh; }

.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--hairline);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
}

.sidebar-brand {
  padding: 24px 20px 20px;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink);
  letter-spacing: 0;
  border-bottom: 1px solid var(--hairline);
}

.sidebar-nav { flex: 1; padding: 12px 8px; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  color: var(--text2);
  cursor: pointer;
  font-size: 14px;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  border-radius: var(--radius-sm);
  transition: all 0.15s;
}

.nav-item:hover { background: var(--soft-stone); color: var(--ink); }
.nav-item.active { background: var(--soft-stone); color: var(--ink); font-weight: 500; }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--hairline);
  font-size: 12px;
  color: var(--text2);
}

.header {
  position: fixed;
  top: 0;
  left: 240px;
  right: 0;
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--hairline);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  z-index: 90;
}

.header-left { display: flex; align-items: center; gap: 12px; }
.menu-btn { display: none; background: none; border: none; color: var(--text); cursor: pointer; padding: 4px; }

.header-right { display: flex; align-items: center; gap: 16px; }

.user-info { display: flex; align-items: center; gap: 8px; }
.user-avatar {
  width: 32px; height: 32px; border-radius: 999px; background: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; color: var(--on-primary);
}
.user-name { font-size: 14px; font-weight: 400; }
.user-role { font-size: 12px; color: var(--text2); text-transform: capitalize; }

.logout-btn {
  background: none; border: 1px solid var(--hairline); color: var(--text2);
  padding: 6px 14px; border-radius: var(--radius-pill); cursor: pointer; font-size: 12px;
  font-family: var(--font-body);
}
.logout-btn:hover { border-color: var(--error); color: var(--error); }

.main-content {
  margin-left: 240px;
  margin-top: 56px;
  padding: 32px 40px;
  min-height: calc(100vh - 56px);
  width: calc(100% - 240px);
  box-sizing: border-box;
}

@media (min-width: 1400px) {
  .main-content { padding: 40px 56px; }
}

.page { display: none; }
.page.active { display: block; }

.card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 24px;
  margin-bottom: 20px;
}

.card-title {
  font-size: 16px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 16px;
}

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 20px;
}

.stat-label {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
.stat-value { font-size: 32px; font-weight: 400; color: var(--ink); line-height: 1.2; }

.empty-state { text-align: center; padding: 48px 20px; }
.empty-state-icon { width: 48px; height: 48px; margin: 0 auto 12px; border: 1px solid var(--hairline); border-radius: 999px; }
.empty-label { font-size: 14px; color: var(--text2); }

.btn {
  padding: 8px 20px;
  border-radius: var(--radius-pill);
  font-size: 14px;
  font-weight: 500;
  line-height: 1.71;
  border: none;
  cursor: pointer;
  font-family: var(--font-body);
  transition: all 0.15s;
}
.btn-primary {
  background: var(--primary);
  color: var(--on-primary);
  padding: 10px 24px;
}
.btn-primary:hover { opacity: 0.85; }
.btn-outline {
  background: transparent;
  border: 1px solid var(--hairline);
  color: var(--ink);
  padding: 8px 16px;
}
.btn-outline:hover { border-color: var(--ink); }
.btn-danger { background: var(--error); color: white; }
.btn-sm { padding: 6px 14px; font-size: 13px; }
.btn-secondary {
  background: none;
  border: none;
  color: var(--ink);
  padding: 8px 0;
  font-size: 14px;
  cursor: pointer;
  text-decoration: underline;
  text-underline-offset: 3px;
  font-family: var(--font-body);
}
.btn-secondary:hover { color: var(--action-blue); }

.input {
  width: 100%;
  padding: 10px 12px;
  border-radius: var(--radius-xs);
  border: 1px solid var(--hairline);
  background: var(--canvas);
  color: var(--ink);
  font-size: 14px;
  font-family: var(--font-body);
}
.input:focus { outline: none; border-color: var(--focus-blue); box-shadow: 0 0 0 2px rgba(76,110,230,0.15); }
.input:disabled { opacity: 0.5; cursor: not-allowed; }

.select {
  width: 100%;
  padding: 10px 12px;
  border-radius: var(--radius-xs);
  border: 1px solid var(--hairline);
  background: var(--canvas);
  color: var(--ink);
  font-size: 14px;
  cursor: pointer;
  font-family: var(--font-body);
}
.select:focus { outline: none; border-color: var(--focus-blue); box-shadow: 0 0 0 2px rgba(76,110,230,0.15); }

.label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 4px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th {
  text-align: left;
  padding: 12px 12px;
  border-bottom: 1px solid var(--hairline);
  color: var(--text2);
  font-weight: 500;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}
td { padding: 12px; border-bottom: 1px solid var(--border-light); }
tr:hover td { background: var(--soft-stone); }

.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  border-radius: var(--radius-pill);
  font-size: 12px;
  font-weight: 500;
  background: var(--soft-stone);
  color: var(--ink);
}
.badge-offer { background: #edfce9; color: #003c33; }
.badge-accepted { background: #edfce9; color: #003c33; }
.badge-enrolled { background: #f1f5ff; color: #1863dc; }
.badge-new { background: var(--soft-stone); color: var(--ink); }
.badge-admin { background: var(--primary); color: var(--on-primary); font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; padding: 1px 8px; }

.agent-toggle { position: relative; display: inline-block; width: 40px; height: 22px; flex-shrink: 0; }
.agent-toggle input { opacity: 0; width: 0; height: 0; }
.agent-toggle .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--hairline); border-radius: 22px; transition: 0.2s; }
.agent-toggle .toggle-slider::before { content: ''; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
.agent-toggle input:checked + .toggle-slider { background: #003c33; }
.agent-toggle input:checked + .toggle-slider::before { transform: translateX(18px); }

.btn-icon { width: 32px; height: 32px; border-radius: var(--radius-sm); border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; background: transparent; transition: 0.15s; }
.btn-icon:hover { background: var(--soft-stone); }
.btn-icon.del svg { stroke: var(--text2); width: 16px; height: 16px; fill: none; stroke-width: 1.5; }
.btn-icon.del:hover svg { stroke: var(--error); }
.btn-icon.edit-btn-icon:hover svg { stroke: var(--action-blue); }
.btn-icon.del-btn-icon svg { stroke: var(--text2); width: 16px; height: 16px; fill: none; stroke-width: 1.5; }
.btn-icon.del-btn-icon:hover svg { stroke: var(--error); }

.mb-4 { margin-bottom: 16px; }
.flex { display: flex; }
.items-center { align-items: center; }
.gap-2 { gap: 8px; }
.gap-3 { gap: 12px; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

.form-group { margin-bottom: 16px; }

.checkbox-label {
  display: flex; align-items: center; gap: 8px; font-size: 14px;
  padding: 8px 12px; border: 1px solid var(--hairline); border-radius: var(--radius-xs);
  cursor: pointer; background: var(--canvas);
}
.checkbox-label input[type="checkbox"] { accent-color: var(--primary); }

.toast {
  position: fixed; bottom: 20px; right: 20px; z-index: 1000;
  padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px;
  color: white; animation: slideIn 0.3s ease;
}
.toast-success { background: #003c33; }
.toast-error { background: var(--error); }
@keyframes slideIn { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.loading-overlay {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--canvas);
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.5s ease;
}
.loading-overlay.fade-out { opacity: 0; }
.loading-content {
  text-align: center;
  max-width: 400px; width: 100%; padding: 0 24px;
  box-sizing: border-box;
}
.loading-logo {
  width: 100px; height: auto; margin-bottom: 40px;
  opacity: 0.8; display: block;
  margin-left: auto; margin-right: auto;
}
.loading-spinner {
  width: 32px; height: 32px; margin: 0 auto 24px;
  border: 2px solid var(--border-light);
  border-top-color: var(--primary); border-radius: 50%;
  animation: loadingSpin 0.8s linear infinite;
}
@keyframes loadingSpin { to { transform: rotate(360deg); } }
.loading-bar-track {
  width: 100%; height: 4px;
  background: var(--border-light);
  border-radius: 2px; overflow: hidden; margin-bottom: 24px;
}
.loading-bar-fill {
  height: 100%; width: 0%;
  background: var(--primary);
  border-radius: 2px; transition: width 0.3s ease;
}
.loading-text {
  font-family: var(--font-body);
  font-size: 14px; color: var(--text2); margin-bottom: 4px;
}
.loading-subtitle {
  font-family: var(--font-body);
  font-size: 12px; color: var(--text2);
}
.loading { text-align: center; padding: 48px; color: var(--text2); font-size: 14px; }
.empty { text-align: center; padding: 48px; color: var(--text2); font-size: 14px; }

.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200;
  display: flex; align-items: center; justify-content: center;
}
.modal {
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: var(--radius-sm); padding: 24px; max-width: 480px; width: 90%;
  max-height: 85vh; overflow-y: auto;
}

.login-page {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--canvas);
}
.login-card {
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: var(--radius-sm); padding: 48px; max-width: 420px; width: 90%; text-align: center;
}
.login-card h1 { font-size: 20px; font-weight: 400; margin-bottom: 8px; color: var(--ink); }
.login-card .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 32px; }
.login-card .login-error { color: var(--error); font-size: 13px; margin-top: 12px; min-height: 20px; }

.cal-wrap { position: relative; }
.cal-popup {
  position: absolute; top: 100%; left: 0; z-index: 300;
  background: var(--surface); border: 1px solid var(--hairline);
  border-radius: var(--radius-xs); padding: 16px; width: 260px;
  margin-top: 4px;
}
.cal-popup.hidden { display: none; }
.cal-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.cal-nav button { background: none; border: none; color: var(--text); cursor: pointer; padding: 4px 8px; font-size: 14px; border-radius: var(--radius-xs); }
.cal-nav button:hover { background: var(--soft-stone); }
.cal-nav span { font-size: 13px; font-weight: 500; }
.cal-grid { width: 100%; border-collapse: collapse; }
.cal-grid th { font-size: 11px; padding: 4px; text-align: center; color: var(--text2); border: none; text-transform: none; letter-spacing: 0; }
.cal-grid td { font-size: 13px; padding: 6px; text-align: center; cursor: pointer; border-radius: var(--radius-xs); border: none; }
.cal-grid td:hover { background: var(--soft-stone); }
.cal-grid td.today { border: 1px solid var(--hairline); }
.cal-grid td.selected { background: var(--primary); color: var(--on-primary); font-weight: 500; }
.cal-grid td.selected:hover { background: var(--primary); }
.cal-grid td.other { color: var(--text2); opacity: 0.4; }
.date-btn {
  padding: 8px 12px; border: 1px solid var(--hairline); border-radius: var(--radius-xs);
  background: var(--canvas); color: var(--text); cursor: pointer; font-size: 14px;
  display: flex; align-items: center; gap: 6px; white-space: nowrap;
}
.date-btn:hover { border-color: var(--ink); }

.public-form-page {
  min-height: 100vh; background: var(--soft-stone); padding: 48px 20px;
}
.public-form-card {
  background: var(--canvas);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm);
  padding: 40px;
  max-width: 540px;
  margin: 0 auto;
}
.public-form-logo {
  display: block; max-width: 160px; margin: 0 auto 24px;
}
.public-form-card h1 { font-size: 24px; font-weight: 400; margin-bottom: 4px; text-align: center; color: var(--ink); }
.public-form-card .subtitle { font-size: 14px; color: var(--text2); margin-bottom: 32px; text-align: center; }
.public-form-card .result {
  background: var(--soft-stone);
  border: none;
  border-radius: var(--radius-sm);
  padding: 24px;
  margin-top: 24px;
  text-align: center;
}
.public-form-card .result .app-id { font-size: 20px; font-weight: 500; color: var(--ink); font-family: var(--font-mono); letter-spacing: 0.02em; }

.card-accent-teal { border-left: 3px solid var(--hairline); }

.filter-bar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.filter-select { min-width: 130px; }
.filter-input { min-width: 120px; }

.lead-modal { max-width: 600px; max-height: 80vh; overflow-y: auto; }
.detail-value { font-size: 14px; color: var(--text); padding: 8px 12px; background: var(--canvas); border-radius: var(--radius-xs); border: 1px solid var(--border-light); }

.stat-grid-5 { grid-template-columns: repeat(5, 1fr); }
@media (max-width: 1024px) { .stat-grid-5 { grid-template-columns: repeat(3, 1fr); } }

.agent-month-group { margin-bottom: 24px; }
.agent-month-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; background: var(--canvas);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  border-bottom: none;
}
.agent-avatar {
  width: 28px; height: 28px; border-radius: 999px;
  background: var(--primary);
  color: var(--on-primary); font-size: 12px; font-weight: 500;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.agent-name { font-size: 14px; font-weight: 500; color: var(--ink); }
.agent-count { font-size: 12px; color: var(--text2); }

.month-section { margin-bottom: 2px; }
.month-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 16px; background: var(--canvas);
  border: 1px solid var(--border-light); border-top: none; cursor: pointer; user-select: none;
  border-radius: 0;
}
.month-row:hover { background: var(--soft-stone); }
.month-toggle { font-size: 10px; color: var(--text2); transition: transform 0.2s; }
.month-label { font-size: 13px; font-weight: 500; color: var(--ink); }
.month-count { font-size: 12px; color: var(--text2); }

.forms-table-wrap { padding: 0; }
.forms-table { width: 100%; border-collapse: collapse; background: var(--canvas); }
.forms-table th {
  font-size: 12px; color: var(--text2); font-weight: 500; text-transform: uppercase; letter-spacing: 0.03em;
  padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--hairline); background: var(--canvas);
}
.forms-table td {
  font-size: 13px; color: var(--ink); padding: 10px 12px; border-bottom: 1px solid var(--border-light);
}
.forms-table tr:last-child td { border-bottom: none; }
.forms-table tr:hover td { background: var(--soft-stone); }
.forms-table .inactive-row td { opacity: 0.4; }
.forms-table .inactive-row:hover td { opacity: 0.6; }
.form-name-cell { font-weight: 500; white-space: nowrap; }
.form-link-cell a { color: var(--action-blue); text-decoration: none; font-size: 13px; }
.form-link-cell a:hover { text-decoration: underline; }
.form-action-cell { white-space: nowrap; display: flex; gap: 4px; align-items: center; }
.form-action-cell .btn { padding: 4px 12px; font-size: 12px; }

.text-small { font-size: 12px; }
.text-muted { color: var(--text2); }

.theme-toggle {
  width: 36px; height: 36px; border-radius: 999px; border: 1px solid var(--hairline);
  background: var(--canvas); color: var(--ink); cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  flex-shrink: 0;
}
.theme-toggle:hover { border-color: var(--ink); }
.theme-toggle svg { width: 18px; height: 18px; }

.greeting-popup {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--canvas);
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.4s ease;
}
.greeting-popup.fade-out { opacity: 0; pointer-events: none; }
.greeting-content {
  text-align: center; max-width: 440px; width: 90%; padding: 0 20px;
  animation: greetingFadeIn 0.6s ease;
}
@keyframes greetingFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.greeting-logo { width: 120px; height: auto; margin: 0 auto 32px; display: block; }
.greeting-title { font-size: 22px; font-weight: 400; color: var(--ink); margin-bottom: 10px; }
.greeting-sub { font-size: 14px; color: var(--text2); margin-bottom: 32px; line-height: 1.6; }
.greeting-btn {
  display: inline-block; padding: 10px 32px; border-radius: var(--radius-pill); border: none;
  background: var(--primary); color: var(--on-primary); font-size: 14px; font-weight: 500; cursor: pointer;
  font-family: var(--font-body); transition: all 0.15s;
}
.greeting-btn:hover { opacity: 0.85; }

.processing-agent-card { margin-bottom: 24px; }
.processing-agent-header { font-size: 15px; font-weight: 500; color: var(--ink); }
.processing-group-section { padding: 16px 20px 20px; border-bottom: 1px solid var(--border-light); }
.processing-group-section:last-child { border-bottom: none; }
.processing-group-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.03em; }

.field-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.field-chip {
  display: inline-flex; padding: 3px 10px; border-radius: var(--radius-pill); font-size: 11px; font-weight: 500;
  background: var(--soft-stone); color: var(--ink); border: 1px solid var(--border-light);
}

.form-detail-modal { max-width: 540px; max-height: 80vh; overflow-y: auto; padding: 24px; }
.form-detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.form-detail-url { font-size: 12px; color: var(--action-blue); background: var(--canvas); }

.app-id-cell { color: var(--ink); font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.02em; }

@media (max-width: 1024px) {
  .sidebar { transform: translateX(-100%); transition: transform 0.2s; }
  .sidebar.open { transform: translateX(0); }
  .header { left: 0; }
  .main-content { margin-left: 0; width: 100%; padding: 24px; }
  .menu-btn { display: block; }
