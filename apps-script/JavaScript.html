<script>
var MIN_LOADING_MS = 1500;
var _loadingStartTime = 0;
var _loadingBarRAF = 0;

function getTheme() { return localStorage.getItem('ugs-theme') || 'light'; }
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('ugs-theme', t);
}
function toggleTheme() {
  var t = getTheme();
  setTheme(t === 'dark' ? 'light' : 'dark');
}

function startLoadingBar() {
  var bar = document.getElementById('loadingBarFill');
  if (!bar) return;
  _loadingStartTime = Date.now();
  if (_loadingBarRAF) cancelAnimationFrame(_loadingBarRAF);
  bar.style.width = '0%';
  function update() {
    var elapsed = Date.now() - _loadingStartTime;
    var pct = Math.min(100, (elapsed / MIN_LOADING_MS) * 100);
    bar.style.width = pct + '%';
    if (elapsed < MIN_LOADING_MS) _loadingBarRAF = requestAnimationFrame(update);
  }
  _loadingBarRAF = requestAnimationFrame(update);
}

function showLoadingOverlay() {
  var el = document.getElementById('loadingOverlay');
  if (!el) return;
  el.style.display = 'flex';
  el.classList.remove('fade-out');
  startLoadingBar();
}

function hideLoadingOverlay() {
  var elapsed = Date.now() - _loadingStartTime;
  var remaining = Math.max(0, MIN_LOADING_MS - elapsed);
  var bar = document.getElementById('loadingBarFill');
  if (_loadingBarRAF) cancelAnimationFrame(_loadingBarRAF);
  if (bar) bar.style.width = '100%';
  var doHide = function () {
    var el = document.getElementById('loadingOverlay');
    if (el) { el.classList.add('fade-out'); setTimeout(function () { el.style.display = 'none'; el.classList.remove('fade-out'); if (bar) bar.style.width = '0%'; }, 500); }
  };
  if (remaining > 0) setTimeout(doHide, remaining);
  else doHide();
}

function _authEmail() { return CURRENT_USER ? CURRENT_USER.email || '' : ''; }
var CURRENT_PAGE = 'dashboard';

function showToast(msg, type) {
  type = type || 'success';
  var el = document.createElement('div');
  el.className = 'toast toast-' + type;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function () { el.remove(); }, 3000);
}

function navigate(page) {
  CURRENT_PAGE = page;
  document.querySelectorAll('.page').forEach(function (p) { p.classList.remove('active'); });
  var pageEl = document.getElementById('page-' + page);
  if (pageEl) pageEl.classList.add('active');
  document.querySelectorAll('.nav-item').forEach(function (n) { n.classList.remove('active'); });
  var nav = document.getElementById('nav-' + page);
  if (nav) nav.classList.add('active');
  if (page === 'dashboard') loadDashboard();
  if (page === 'leads') loadLeads();
  if (page === 'processing') loadProcessing();
  if (page === 'agents') loadAgents();
  if (page === 'forms') loadForms();
  if (window.innerWidth < 769) closeMenu();
}

function toggleMenu() {
  document.querySelector('.sidebar').classList.toggle('open');
}
function closeMenu() {
  document.querySelector('.sidebar').classList.remove('open');
}

function formatDate(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function statusBadge(status) {
  var s = status || 'New';
  var cls = 'badge-new';
  if (s === 'COL Sent') cls = 'badge-offer-sent';
  if (s === 'Agreed') cls = 'badge-accepted';
  if (s === 'Enrolled') cls = 'badge-enrolled';
  if (s === 'Deleted') cls = 'badge-deleted';
  return '<span class="badge ' + cls + '">' + escapeHtml(s) + '</span>';
}

function _authEmail() { return CURRENT_USER ? CURRENT_USER.email || '' : ''; }

function initApp() {
  showLoadingOverlay();
  document.querySelector('.loading-text').textContent = 'Authenticating...';
  google.script.run.withSuccessHandler(function(result) {
    if (result && result.success) {
      CURRENT_USER = result;
      if (result.role === 'admin') CURRENT_USER.role = 'admin';
      if (result.name) CURRENT_USER.name = result.name;
      document.querySelector('.loading-text').textContent = 'Loading...';
      document.getElementById('app-shell').style.display = 'flex';
      hideLoadingOverlay();
      renderUserInfo();
      navigate('dashboard');
    } else if (result && result.error === 'Not authenticated') {
      hideLoadingOverlay();
      document.getElementById('login-page').style.display = 'flex';
      document.getElementById('login-error').innerHTML = '<div class="login-form-box" id="login-form-box">' +
        '<p style="margin:0;font-size:14px;color:var(--text)">Please sign in with your @unisza.edu.my Google account to continue.</p></div>';
    } else if (result && result.error === 'Not registered') {
      hideLoadingOverlay();
      document.getElementById('login-page').style.display = 'flex';
      document.getElementById('login-error').innerHTML = '<div class="login-form-box" id="login-form-box">' +
        '<p style="margin:0 0 12px;font-size:14px;color:var(--text)">Your account (' + escapeHtml(result.email || '') + ') is not registered.</p>' +
        '<p style="margin:0;font-size:13px;color:var(--text2)">Please email <a href="mailto:pps@unisza.edu.my">pps@unisza.edu.my</a> to request access.</p></div>';
    } else {
      hideLoadingOverlay();
      document.getElementById('login-page').style.display = 'flex';
      document.getElementById('login-error').innerHTML = '<div class="login-form-box" id="login-form-box">' +
        '<p style="margin:0;font-size:14px;color:var(--danger)">' + escapeHtml((result && result.error) || 'Authentication failed') + '</p></div>';
    }
  }).verifyUserAccess();
}

function logout() {
  CURRENT_USER = null;
  try { localStorage.removeItem('ugs-user'); } catch(ex) {}
  document.getElementById('app-shell').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('login-error').textContent = '';
  initApp();
}

function renderUserInfo() {
  if (!CURRENT_USER) return;
  document.getElementById('user-name').textContent = CURRENT_USER.name;
  document.getElementById('user-role').textContent = CURRENT_USER.role;
  document.getElementById('user-avatar').textContent = (CURRENT_USER.name || 'U')[0].toUpperCase();
  document.getElementById('nav-agents').style.display = CURRENT_USER.role === 'admin' ? '' : 'none';
}

function renderDashboardContent(el, s) {
  var html = '<div class="stat-grid stat-grid-5">' +
    '<div class="stat-card"><div class="stat-label">Total Leads</div><div class="stat-value">' + s.totalLeads + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">COL Sent</div><div class="stat-value">' + s.offersSent + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Agreed</div><div class="stat-value">' + s.accepted + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Enrolled</div><div class="stat-value">' + s.enrolled + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Conversion</div><div class="stat-value">' + s.conversionRate + '%</div></div>' +
  '</div>' +
  '<div class="stat-grid stat-grid-3" style="margin-top:12px">' +
    '<div class="stat-card"><div class="stat-label">Groups</div><div class="stat-value">' + (s.groupsCount || 0) + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">eVAL Approved</div><div class="stat-value">' + (s.evalApproved || 0) + '</div></div>' +
    '<div class="stat-card"><div class="stat-label">Under Processing</div><div class="stat-value">' + (s.underProcessing || 0) + '</div></div>' +
  '</div>';

  var byAgentRows = s.byAgent || [];
  html += '<div class="card"><div class="card-title">Activity by Agent</div>';
  if (byAgentRows.length === 0) {
    html += '<div class="empty-state"><div class="empty-state-icon" style="border-color:rgba(147,51,234,0.3);color:rgba(147,51,234,0.6)"></div><div class="empty-label">No agent activity yet</div></div>';
  } else {
    html += '<div class="table-wrap"><table><thead><tr><th>Agent</th><th>Leads</th><th>COL Sent</th><th>Agreed</th><th>Enrolled</th><th>Conv</th></tr></thead><tbody>';
    byAgentRows.forEach(function (a) {
      var conv = a.offersSent > 0 ? Math.round((a.accepted / a.offersSent) * 100) : 0;
      html += '<tr><td>' + escapeHtml(a.agentName) + '</td><td>' + a.leadCount + '</td><td>' + a.offersSent + '</td><td>' + a.accepted + '</td><td>' + a.enrolled + '</td><td>' + conv + '%</td></tr>';
    });
    html += '</tbody></table></div>';
  }
  html += '</div>';

  html += '<div class="grid-2"><div class="card"><div class="card-title">Recent Activity</div>';
  var ra = s.recentActivity || [];
  if (ra.length === 0) {
    html += '<div class="empty-state"><div class="empty-state-icon"></div><div class="empty-label">No recent activity</div></div>';
  } else {
    html += '<table><thead><tr><th>App ID</th><th>Name</th><th>Status</th><th>Date</th></tr></thead><tbody>';
    ra.forEach(function (a) {
      html += '<tr><td class="app-id-cell">' + escapeHtml(a.applicationId) + '</td><td>' + escapeHtml(a.fullName) + '</td><td>' + statusBadge(a.status) + '</td><td>' + formatDate(a.timestamp) + '</td></tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div><div class="card"><div class="card-title">By Status</div>';
  var byStatus = s.byStatus || {};
  if (Object.keys(byStatus).length === 0) {
    html += '<div class="empty-state"><div class="empty-state-icon" style="border-color:rgba(147,51,234,0.3);color:rgba(147,51,234,0.6)"></div><div class="empty-label">No data</div></div>';
  } else {
    html += '<table><thead><tr><th>Status</th><th>Count</th></tr></thead><tbody>';
    Object.keys(byStatus).forEach(function (k) {
      html += '<tr><td>' + statusBadge(k) + '</td><td>' + byStatus[k] + '</td></tr>';
    });
    html += '</tbody></table>';
  }
  html += '</div></div>';
  el.innerHTML = html;
}

function loadDashboard(summary) {
  var el = document.getElementById('dashboard-content');
  if (summary) { renderDashboardContent(el, summary); return; }
  el.innerHTML = '<div class="loading">Loading...</div>';
  google.script.run.withSuccessHandler(function (result) {
    if (!result || !result.success) { el.innerHTML = '<div class="empty">Error loading dashboard</div>'; return; }
    renderDashboardContent(el, result.summary);
  }).getDashboard('', _authEmail());
}

function loadLeads(filters) {
  var el = document.getElementById('leads-content');
  el.innerHTML = '<div class="loading">Loading...</div>';
  google.script.run.withSuccessHandler(function (result) {
    if (!result || !result.success) { el.innerHTML = '<div class="empty">Error loading leads</div>'; return; }
    var leads = result.leads;
    var isAdmin = CURRENT_USER.role === 'admin';
    renderLeadsView(leads, isAdmin);
  }).getLeads(filters || {}, _authEmail());
}

function renderLeadsView(leads, isAdmin) {
  var el = document.getElementById('leads-content');
  var html = '<div class="flex-between mb-4"><div class="card-title">Leads (' + leads.length + ')</div></div>';

  html += renderFilterBar(leads, isAdmin);
  html += '<div class="card"><div class="table-wrap"><table><thead><tr>' +
    '<th>App ID</th><th>Name</th><th>Nationality</th><th>Email</th><th>Programme</th><th>Status</th><th>Date</th><th style="width:100px">Action</th>' +
    '</tr></thead><tbody>';

  if (leads.length === 0) {
    html += '<tr><td colspan="8" class="empty-state"><div class="empty-state-icon"></div><div class="empty-label">No leads found</div></td></tr>';
  } else {
    leads.forEach(function (l) {
      html += '<tr>' +
        '<td class="app-id-cell">' + escapeHtml(l.Reference) + '</td>' +
        '<td>' + escapeHtml(l.Name) + '</td>' +
        '<td>' + escapeHtml(l.Nationality) + '</td>' +
        '<td>' + escapeHtml(l.Email) + '</td>' +
        '<td>' + escapeHtml(l.Programme) + '</td>' +
        '<td>' + statusBadge(l.Status) + '</td>' +
        '<td>' + formatDate(l.Timestamp) + '</td>' +
        '<td class="action-cell">' +
          '<select class="select action-select" onchange="handleLeadAction(this, \'' + escapeHtml(l.Reference) + '\')">' +
            '<option value="">Actions</option>' +
            '<option value="edit">Edit</option>' +
            '<option value="delete">Delete</option>' +
          '</select>' +
        '</td>' +
        '</tr>';
    });
  }
  html += '</tbody></table></div></div>';
  el.innerHTML = html;
}

function renderFilterBar(leads, isAdmin) {
  var statuses = ['New', 'COL Sent', 'Agreed', 'Enrolled'];
  var statusOpts = '<option value="">All Statuses</option>';
  statuses.forEach(function (s) { statusOpts += '<option value="' + s + '" ' + (filterState.status === s ? 'selected' : '') + '>' + s + '</option>'; });

  var agents = [];
  var seen = {};
  leads.forEach(function (l) { var n = l.AgentName || l.AgentID; if (!seen[n]) { seen[n] = true; agents.push(n); } });
  var agentOpts = '<option value="">All Agents</option>';
  agents.forEach(function (a) { agentOpts += '<option value="' + escapeHtml(a) + '" ' + (filterState.agent === a ? 'selected' : '') + '>' + escapeHtml(a) + '</option>'; });

  var html = '<div class="filter-bar">' +
    '<select id="f-status" class="select filter-select">' + statusOpts + '</select>' +
    (isAdmin ? '<select id="f-agent" class="select filter-select">' + agentOpts + '</select>' : '') +
    '<input type="date" id="f-date-from" class="input filter-input" value="' + (filterState.dateFrom || '') + '" placeholder="From">' +
    '<input type="date" id="f-date-to" class="input filter-input" value="' + (filterState.dateTo || '') + '" placeholder="To">' +
    '<button class="btn btn-sm btn-primary" onclick="applyFilters()">Apply</button>' +
    '<button class="btn btn-sm btn-outline" onclick="clearFilters()">Clear</button>' +
    '</div>';
  return html;
}

var filterState = { status: '', agent: '', dateFrom: '', dateTo: '' };

function applyFilters() {
  filterState.status = document.getElementById('f-status') ? document.getElementById('f-status').value : '';
  filterState.agent = document.getElementById('f-agent') ? document.getElementById('f-agent').value : '';
  filterState.dateFrom = document.getElementById('f-date-from') ? document.getElementById('f-date-from').value : '';
  filterState.dateTo = document.getElementById('f-date-to') ? document.getElementById('f-date-to').value : '';
  loadLeads(filterState);
}

function clearFilters() {
  filterState = { status: '', agent: '', dateFrom: '', dateTo: '' };
  loadLeads();
}

function editLeadModal(appId) {
  google.script.run.withSuccessHandler(function (result) {
    if (!result || !result.success) { alert(result.error); return; }
    var l = result.lead;
    var isAdmin = CURRENT_USER.role === 'admin';
    var statusOpts = '';
    ['New', 'COL Sent', 'Agreed', 'Enrolled'].forEach(function (s) {
      statusOpts += '<option value="' + s + '" ' + (l.Status === s ? 'selected' : '') + '>' + s + '</option>';
    });

    var html = '<div class="modal-overlay" style="display:flex" onclick="closeLeadModal(event)"><div class="modal lead-modal" onclick="event.stopPropagation()">' +
      '<div class="flex-between mb-4"><div class="card-title">Edit Lead</div><button class="btn btn-outline btn-sm" onclick="closeLeadModal()">Close</button></div>' +
      '<div class="form-group"><label class="label">App ID</label><div class="detail-value">' + escapeHtml(l.Reference) + '</div></div>' +
      (isAdmin ? '<div class="form-group"><label class="label">Name</label><input id="ed-name" class="input" value="' + escapeHtml(l.Name) + '"></div>' : '') +
      (isAdmin ? '<div class="form-group"><label class="label">Email</label><input id="ed-email" class="input" type="email" value="' + escapeHtml(l.Email) + '"></div>' : '') +
      (isAdmin ? '<div class="form-group"><label class="label">Passport</label><input id="ed-passport" class="input" value="' + escapeHtml(l.Passport) + '"></div>' : '') +
      (isAdmin ? '<div class="form-group"><label class="label">Nationality</label><input id="ed-nationality" class="input" value="' + escapeHtml(l.Nationality) + '"></div>' : '') +
      (isAdmin ? '<div class="form-group"><label class="label">Programme</label><input id="ed-programme" class="input" value="' + escapeHtml(l.Programme) + '"></div>' : '') +
      (isAdmin ? '<div class="form-group"><label class="label">Structure</label><input id="ed-structure" class="input" value="' + escapeHtml(l.Structure) + '"></div>' : '') +
      (isAdmin ? '<div class="form-group"><label class="label">Location</label><input id="ed-location" class="input" value="' + escapeHtml(l.LocationEvent) + '"></div>' : '') +
      '<div class="form-group"><label class="label">Remarks</label><textarea id="ed-remarks" class="input">' + escapeHtml(l.Remarks) + '</textarea></div>' +
      '<div class="form-group"><label class="label">Status</label><select id="ed-status" class="select">' + statusOpts + '</select></div>' +
      '<div class="flex gap-2" style="justify-content:flex-end;margin-top:16px">' +
      '<button class="btn btn-outline btn-sm" onclick="closeLeadModal()">Cancel</button>' +
      '<button class="btn btn-primary btn-sm" onclick="saveLeadEdit(\'' + escapeHtml(appId) + '\')">Save</button></div>' +
      '</div></div>';
    document.body.insertAdjacentHTML('beforeend', html);
  }).getLead(appId, _authEmail());
}

function saveLeadEdit(appId) {
  var updates = {};
  if (CURRENT_USER.role === 'admin') {
    var edName = document.getElementById('ed-name'); if (edName) updates.name = edName.value;
    var edEmail = document.getElementById('ed-email'); if (edEmail) updates.email = edEmail.value;
    var edPassport = document.getElementById('ed-passport'); if (edPassport) updates.passport = edPassport.value;
    var edNationality = document.getElementById('ed-nationality'); if (edNationality) updates.nationality = edNationality.value;
    var edProgramme = document.getElementById('ed-programme'); if (edProgramme) updates.programme = edProgramme.value;
    var edStructure = document.getElementById('ed-structure'); if (edStructure) updates.structure = edStructure.value;
    var edLocation = document.getElementById('ed-location'); if (edLocation) updates.location = edLocation.value;
  }
  var edRemarks = document.getElementById('ed-remarks'); if (edRemarks) updates.remarks = edRemarks.value;
  var edStatus = document.getElementById('ed-status'); if (edStatus) updates.status = edStatus.value;

  google.script.run.withSuccessHandler(function (r) {
    if (!r.success) { alert(r.error); return; }
    closeLeadModal();
    applyFilters();
  }).updateLead(appId, updates, _authEmail());
}

function deleteLeadAction(appId) {
  if (!confirm('Delete this lead permanently? This cannot be undone.')) return;
  google.script.run.withSuccessHandler(function (r) {
    if (!r.success) { alert(r.error); return; }
    showToast('Lead permanently deleted');
    applyFilters();
  }).deleteLead(appId, _authEmail());
}

function closeLeadModal(e) {
  var overlay = document.querySelector('.modal-overlay');
  if (overlay) overlay.remove();
  if (e && e.target !== e.currentTarget) return;
}

function handleLeadAction(sel, appId) {
  var val = sel.value;
  sel.value = '';
  if (val === 'edit') editLeadModal(appId);
  if (val === 'delete') deleteLeadAction(appId);
}

var _emgsCountdownInterval = null;

function loadProcessing() {
  var el = document.getElementById('processing-content');
  if (_processingCache) {
    var cached = _processingCache;
    _processingCache = null;
    renderProcessing(cached.candidates, cached.groups || []);
    var countEl = document.getElementById('emgs-countdown');
    if (countEl) {
      var sched = cached.schedule || {};
      if (sched.active && sched.nextRun) {
        var nextDate = new Date(sched.nextRun);
        countEl.style.display = 'block';
        if (_emgsCountdownInterval) clearInterval(_emgsCountdownInterval);
        _emgsCountdownInterval = setInterval(function() {
          var diff = nextDate - new Date();
          if (diff <= 0) { countEl.textContent = 'EMGS: running...'; return; }
          countEl.textContent = 'Next EMGS: ' + Math.floor(diff / 86400000) + 'd ' + Math.floor((diff % 86400000) / 3600000) + 'h ' + Math.floor((diff % 3600000) / 60000) + 'm ' + Math.floor((diff % 60000) / 1000) + 's';
        }, 1000);
      } else {
        countEl.textContent = 'EMGS: not scheduled';
      }
    }
    return;
  }
  el.innerHTML = '<div class="loading">Loading...</div>';
  if (_emgsCountdownInterval) { clearInterval(_emgsCountdownInterval); _emgsCountdownInterval = null; }
  google.script.run.withSuccessHandler(function (result) {
    if (!result || !result.success) { el.innerHTML = '<div class="empty">Error: ' + escapeHtml((result && result.error) || 'unknown') + '</div>'; return; }
    _processingGroupsCache = result.groups || [];
    renderProcessing(result.candidates, result.groups || []);
    var countEl = document.getElementById('emgs-countdown');
    if (!countEl) return;
    var sched = result.schedule || {};
    if (sched.active && sched.nextRun) {
      var nextDate = new Date(sched.nextRun);
      countEl.style.display = 'block';
      function tick() {
        var diff = nextDate - new Date();
        if (diff <= 0) { countEl.textContent = 'EMGS: running...'; return; }
        countEl.textContent = 'Next EMGS: ' + Math.floor(diff / 86400000) + 'd ' + Math.floor((diff % 86400000) / 3600000) + 'h ' + Math.floor((diff % 3600000) / 60000) + 'm ' + Math.floor((diff % 60000) / 1000) + 's';
      }
      tick();
      if (_emgsCountdownInterval) clearInterval(_emgsCountdownInterval);
      _emgsCountdownInterval = setInterval(tick, 1000);
    } else {
      countEl.textContent = 'EMGS: not scheduled';
    }
  }).getProcessingPageData(_authEmail());
}

function getEmgsStatus_(rawProgress) {
  if (isNaN(rawProgress) || rawProgress <= 0) return 'Application Not Started';
  if (rawProgress <= 0.15) return 'Document Review';
  if (rawProgress <= 0.32) return 'Institutional & EMGS Vetting';
  if (rawProgress <= 0.35) return 'Submitted to Immigration';
  return 'eVAL Approved / eVisa Ready';
}

function emgsStatusBadge_(status) {
  var cls = 'badge-new';
  if (status === 'Document Review') cls = 'badge-warning';
  if (status === 'Institutional & EMGS Vetting') cls = 'badge-offer-sent';
  if (status === 'Submitted to Immigration') cls = 'badge-offer-sent';
  if (status === 'eVAL Approved / eVisa Ready') cls = 'badge-accepted';
  return '<span class="badge ' + cls + '">' + escapeHtml(status) + '</span>';
}

var _processingGroupsCache = [];
var _processingCache = null;

function toggleGroupTable(id) {
  var body = document.getElementById(id);
  if (!body) return;
  var isHidden = body.style.display === 'none' || body.style.display === '';
  body.style.display = isHidden ? 'block' : 'none';
  var chevron = body.parentNode.querySelector('.proc-group-chevron');
  if (chevron) chevron.textContent = isHidden ? '▲' : '▼';
}

function renderProcessing(candidates, groups) {
  var el = document.getElementById('processing-content');
  var byAgent = {};
  candidates.forEach(function (c) {
      var agentName = c['AgentName'] || 'Unknown';
      if (!byAgent[agentName]) byAgent[agentName] = {};
      var group = c['Group'] || 'Default';
      if (!byAgent[agentName][group]) byAgent[agentName][group] = [];
      byAgent[agentName][group].push(c);
    });

    var html = '<div class="flex-between mb-4"><div class="card-title">Processing (' + candidates.length + ')</div>' +
      (CURRENT_USER.role === 'admin' ? '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px"><div style="display:flex;gap:8px"><button class="btn btn-outline btn-sm" onclick="showAddGroupModal()">Add Group</button><button class="btn btn-outline btn-sm" onclick="migrateCandidateGroups()">Migrate Groups</button><button class="btn btn-outline btn-sm" onclick="setupEmgsSchedule()">Setup Schedule</button><button class="btn btn-primary btn-sm" id="emgs-check-btn" onclick="runEmgsCheck()">Check EMGS</button></div><div id="emgs-countdown" class="text-muted" style="font-size:11px;display:none"></div></div>' : '') +
      '</div>';
    var agentNames = Object.keys(byAgent).sort();
    if (agentNames.length === 0) {
      html += '<div class="empty-state"><div class="empty-state-icon"></div><div class="empty-label">No candidates found</div></div>';
      el.innerHTML = html;
      return;
    }

    agentNames.forEach(function (agentName) {
      html += '<div class="card processing-agent-card">' +
        '<div class="card-title processing-agent-header">' + escapeHtml(agentName) + '</div>' +
        '<div class="proc-table-header"><span>Group Name</span><span>Total</span><span>Status (Ongoing: Orange / Completed: Green)</span><span></span><span></span></div>';
      var agentGroups = byAgent[agentName];
      var groupNames = Object.keys(agentGroups).sort();
      groupNames.forEach(function (groupName) {
        var groupObj = null;
        for (var gi = 0; gi < groups.length; gi++) {
          if (groups[gi].GroupName === groupName && groups[gi].FilingStatus === 'Active') {
            groupObj = groups[gi];
            break;
          }
        }
        var groupId = groupObj ? groupObj.GroupID : '';
        var isAdmin = CURRENT_USER.role === 'admin';
        var candidatesInGroup = agentGroups[groupName];
        var totalCount = candidatesInGroup.length;
        var evalApprovedCount = 0;
        var underProcessingCount = 0;
        candidatesInGroup.forEach(function (r) {
          var rawProgress = parseFloat(r['Progress (%)'] || r['Application Progress (%)'] || 0);
          var filingStatus = r['FilingStatus'] || '';
          if (filingStatus === 'Deleted' || filingStatus === 'Complete') return;
          if (rawProgress > 0.35) { evalApprovedCount++; }
          else { underProcessingCount++; }
        });
        var sectionId = 'grp-' + groupName.replace(/[^a-zA-Z0-9]/g, '') + '-' + agentName.replace(/[^a-zA-Z0-9]/g, '') + '-' + totalCount + '-' + Math.random().toString(36).substr(2, 4);

        html += '<div class="proc-group-row" data-group="' + escapeHtml(groupName) + '">' +
          '<div class="proc-group-header" onclick="toggleGroupTable(\'' + sectionId + '\')">' +
          '<div class="proc-group-name">' + escapeHtml(groupName) + '</div>' +
          '<div class="proc-group-stat">' + totalCount + '</div>' +
          '<div class="proc-bar-track">' +
            (underProcessingCount > 0 ? '<div class="proc-bar-seg proc-bar-proc" style="width:' + Math.round(underProcessingCount / totalCount * 100) + '%"><span class="proc-bar-label">' + underProcessingCount + '</span></div>' : '') +
            (evalApprovedCount > 0 ? '<div class="proc-bar-seg proc-bar-eval" style="width:' + Math.round(evalApprovedCount / totalCount * 100) + '%"><span class="proc-bar-label">' + evalApprovedCount + '</span></div>' : '') +
            (totalCount === 0 ? '<span class="proc-bar-empty">0</span>' : '') +
          '</div>' +
          '<div class="proc-group-actions">' +
            (groupId ? '' +
              (isAdmin || groupObj.AgentID === CURRENT_USER.agentId ? '<button class="btn-icon" onclick="event.stopPropagation();showEditGroupModal(\'' + escapeHtml(groupId) + '\')" title="Edit group">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M17 3a2.828 2.828 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg></button>' : '') +
              (isAdmin ? '<button class="btn-icon" onclick="event.stopPropagation();showArchiveGroupModal(\'' + escapeHtml(groupId) + '\', \'' + escapeHtml(groupName) + '\')" title="Archive group">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M21 8v13H3V8"/><path d="M1 3h22v5H1z"/><path d="M10 12h4"/></svg></button>' : '') +
              (isAdmin ? '<button class="btn-icon del-btn-icon" onclick="event.stopPropagation();showDeleteGroupModal(\'' + escapeHtml(groupId) + '\', \'' + escapeHtml(groupName) + '\')" title="Delete group">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg></button>' : '') +
              (isAdmin ? '<button class="btn-icon" onclick="event.stopPropagation();showAddCandidateModal(\'' + escapeHtml(groupName) + '\')" title="Add candidate">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></button>' : '') +
            '' : '') +
          '</div>' +
          '<span class="proc-group-chevron">▼</span>' +
          '</div>' +
          '<div class="proc-group-body" id="' + sectionId + '" style="display:none">' +
          '<div class="table-wrap"><table><thead><tr>' +
          '<th>Full Name</th><th>Travel Document</th><th>Nationality</th><th>App No</th><th>Status</th><th>Progress</th><th style="width:100px">Action</th>' +
          '</tr></thead><tbody>';
        candidatesInGroup.forEach(function (r) {
          var rawProgress = parseFloat(r['Progress (%)'] || r['Application Progress (%)'] || 0);
          var progressText = (isNaN(rawProgress) ? 0 : Math.round(rawProgress * 100)) + '%';
          var emgsStatus_ = getEmgsStatus_(rawProgress);
          var filingStatus = r['FilingStatus'] || '';
          var rowClass = filingStatus === 'Deleted' || filingStatus === 'Complete' ? ' class="inactive-row"' : '';
          html += '<tr' + rowClass + ' data-crow="' + r._row + '" data-group="' + escapeHtml(groupName) + '" data-status="' + escapeHtml(r['Application Status'] || '') + '" data-progress="' + rawProgress + '">' +
            '<td>' + escapeHtml(r['Full Name (as in Passport)'] || r['Full Name'] || '') + (filingStatus ? ' <span class="badge badge-deleted" style="font-size:10px">' + escapeHtml(filingStatus) + '</span>' : '') + '</td>' +
            '<td>' + escapeHtml(r['Travel Document No.'] || '') + '</td>' +
            '<td>' + escapeHtml(r['Nationality'] || '') + '</td>' +
            '<td>' + escapeHtml(r['Application No.'] || '') + '</td>' +
            '<td>' + emgsStatusBadge_(emgsStatus_) + '</td>' +
            '<td>' + progressText + '</td>' +
            '<td class="action-cell">' +
              '<button class="btn-icon edit-btn-icon" onclick="editCandidateModal(' + r._row + ')" title="Edit candidate">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M17 3a2.828 2.828 0 114 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>' +
              '</button>' +
              (isAdmin ? '<button class="btn-icon del-btn-icon" onclick="showDeleteCandidateModal(' + r._row + ')" title="Delete candidate">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 012-2h4a2 2 0 012 2v2"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6"/></svg>' +
              '</button>' : '') +
            '</td>' +
            '</tr>';
        });
        html += '</tbody></table></div></div></div>';
      });
      html += '</div>';
    });
    el.innerHTML = html;
}

function runEmgsCheck() {
  var btn = document.getElementById('emgs-check-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Checking...'; }
  google.script.run.withSuccessHandler(function (r) {
    if (btn) { btn.disabled = false; btn.textContent = 'Check EMGS'; }
    if (!r.success) { alert('EMGS check failed: ' + (r.error || 'unknown')); return; }
    var res = r.result;
    var msg = 'Checked: ' + res.checked + ', Updated: ' + res.updated + ', Skipped: ' + res.skipped;
    if (res.error) msg = 'Error: ' + res.error;
    alert(msg);
    loadProcessing();
  }).checkEmgsNow(_authEmail());
}

function setupEmgsSchedule() {
  if (!confirm('Set up automatic EMGS checks every Monday & Thursday at 06:00 MYT?')) return;
  google.script.run.withSuccessHandler(function (r) {
    if (!r.success) { alert('Failed: ' + r.error); return; }
    alert(r.message || 'Schedule set up successfully');
  }).setupEmgsCronTrigger(_authEmail());
}

    '<div class="form-group"><label class="label">Application No.</label><input id="edc-appNo" class="input" value="' + escapeHtml(appNo) + '"></div>' +
    (isAdmin ? '<div class="form-group"><label class="label">Group</label><input id="edc-group" class="input" value="' + escapeHtml(groupName) + '"></div>' : '') +
    (isAdmin ? '<div class="form-group"><label class="label">Application Status</label><input id="edc-status" class="input" value="' + escapeHtml(statusText) + '"></div>' : '') +

    (isAdmin ? '<div class="form-group"><label class="label">Filing Status</label><select id="edc-filingStatus" class="select"><option value="">Active</option><option value="Deleted">Deleted</option><option value="Complete">Complete</option></select></div>' : '') +

function closeCandidateModal(e) {
  var overlay = document.getElementById('candidate-edit-overlay');
  if (overlay) overlay.remove();
  if (e && e.target !== overlay) return;
}

function saveCandidateEdit() {
  var rowIndex = parseInt(document.getElementById('edc-rowIndex').value, 10);
  var updates = {};

  var fn = document.getElementById('edc-fullName'); if (fn) updates.fullName = fn.value;
  var td = document.getElementById('edc-travelDoc'); if (td) updates.travelDoc = td.value;
  var nat = document.getElementById('edc-nationality'); if (nat) updates.nationality = nat.value;
  var app = document.getElementById('edc-appNo'); if (app) updates.appNo = app.value;

  if (CURRENT_USER.role === 'admin') {
    var grp = document.getElementById('edc-group'); if (grp) updates.group = grp.value;
    var st = document.getElementById('edc-status'); if (st) updates.status = st.value;
    var prog = document.getElementById('edc-progress'); if (prog) updates.progress = parseFloat(prog.value) / 100;
    var fs = document.getElementById('edc-filingStatus'); if (fs && fs.value) updates.filingStatus = fs.value;
  }

  google.script.run.withSuccessHandler(function (r) {
    if (!r.success) { alert(r.error || 'Save failed'); return; }
    closeCandidateModal();
    loadProcessing();
  }).updateCandidate(rowIndex, updates, _authEmail());
}

function createGroupAction() {
  var isAdmin = CURRENT_USER.role === 'admin';
  var name = document.getElementById('ag-name').value.trim();
  if (!name) { showToast('Group name required', 'error'); return; }
  var agentName, agentId;
  if (isAdmin) {
    var sel = document.getElementById('ag-agent');
    agentName = sel ? sel.options[sel.selectedIndex].text : '';
    agentId = sel ? sel.value : '';
  } else {
    agentName = CURRENT_USER.name;
    agentId = CURRENT_USER.agentId;
  }
  var data = {
    groupName: name,
    agentName: agentName,
    agentId: agentId,
    startDate: document.getElementById('ag-start').value,
    mainInstitution: document.getElementById('ag-institution').value.trim(),
    country: document.getElementById('ag-country').value,
    expectedEndDate: document.getElementById('ag-end').value,
    remarks: document.getElementById('ag-remarks').value.trim(),
  };
  google.script.run.withSuccessHandler(function (r) {
    if (!r.success) { showToast(r.error, 'error'); return; }
    closeModalById('add-group-overlay');
    showToast('Group created');
    loadProcessing();
  }).createGroup(data, _authEmail());
}

function migrateCandidateGroups() {
  var confirmed = confirm('Scan Candidate sheet for groups not yet in Groups sheet and create them?');

  google.script.run.withSuccessHandler(function (r) {

    if (done) return;
    done = true;
    el.innerHTML = '<div class="empty">Request timed out (15s).</div>';
  }, 15000);
  var filters = {};
  if (CURRENT_USER && CURRENT_USER.role === 'admin') {
    var sd = document.getElementById('f-show-deleted-forms');
    filters.showDeleted = sd ? sd.checked : false;
  }
  google.script.run.withSuccessHandler(function (result) {
    if (done) return;
    done = true;
    clearTimeout(timeoutId);
    try {
      if (!result || !result.success) { el.innerHTML = '<div class="empty">Error: ' + (result && result.error || 'unknown') + '</div>'; return; }
      var forms = result.forms || [];
      var isAdmin = CURRENT_USER && CURRENT_USER.role === 'admin';

      console.error('[Forms] render error', e);

    }
  }).withFailureHandler(function (error) {
    if (done) return;
    done = true;
    clearTimeout(timeoutId);
    var msg = error && error.message ? error.message : String(error || 'unknown');
    el.innerHTML = '<div class="empty">Server error: ' + msg + '</div>';

var F_FILTER = { search: '', agent: '' };

function filterFormsTimeline() {
  var searchEl = document.getElementById('f-search');
  var agentEl = document.getElementById('f-agent');
  F_FILTER.search = searchEl ? searchEl.value.toLowerCase() : '';
  F_FILTER.agent = agentEl ? agentEl.value : '';
  var groups = document.querySelectorAll('.agent-month-group');
  groups.forEach(function (group) {
    var agentName = group.getAttribute('data-agent') || '';
    var matchAgent = !F_FILTER.agent || agentName === F_FILTER.agent;
    var anyVisible = false;
    var months = group.querySelectorAll('.month-section');
    months.forEach(function (mo) {
      var rows = mo.querySelectorAll('.forms-table tbody tr');
      var moVisible = false;
      rows.forEach(function (row) {
        var text = (row.textContent || '').toLowerCase();
        var visible = matchAgent && (!F_FILTER.search || text.indexOf(F_FILTER.search) !== -1);
        row.style.display = visible ? '' : 'none';
        if (visible) moVisible = true;
      });
      mo.style.display = moVisible ? '' : 'none';
      if (moVisible) anyVisible = true;
    });
    group.style.display = anyVisible ? '' : 'none';
  });
}

var EDIT_CAL_DATE = new Date();
var EDIT_CAL_SELECTED = '';

function toggleEditCalendar() {
  var popup = document.getElementById('edit-cal-popup');
  if (popup.classList.contains('hidden')) {
    EDIT_CAL_DATE = EDIT_CAL_SELECTED ? new Date(EDIT_CAL_SELECTED + 'T00:00:00') : new Date();
    popup.classList.remove('hidden');
    renderEditCalendar();
  } else {
    popup.classList.add('hidden');
  }
}

function renderEditCalendar() {
  var year = EDIT_CAL_DATE.getFullYear();
  var month = EDIT_CAL_DATE.getMonth();
  document.getElementById('edit-cal-month-year').textContent = new Date(year, month).toLocaleString('en-US', { month: 'long', year: 'numeric' });
  var firstDay = new Date(year, month, 1).getDay();
  var daysInMonth = new Date(year, month + 1, 0).getDate();
  var today = new Date().toISOString().slice(0, 10);
  var html = '';
  var day = 1;
  for (var r = 0; r < 6; r++) {
    if (day > daysInMonth) break;
    html += '<tr>';
    for (var c = 0; c < 7; c++) {
      if ((r === 0 && c < firstDay) || day > daysInMonth) {
        html += '<td></td>';
      } else {
        var ds = year + '-' + ('0' + (month + 1)).slice(-2) + '-' + ('0' + day).slice(-2);
        var cls = '';
        if (ds === today) cls += ' today';
        if (ds === EDIT_CAL_SELECTED) cls += ' selected';
        html += '<td class="' + cls + '" onclick="selectEditDate(\'' + ds + '\')">' + day + '</td>';
        day++;
      }
    }
    html += '</tr>';
  }
  document.getElementById('edit-cal-body').innerHTML = html;
}

function prevEditMonth() { EDIT_CAL_DATE.setMonth(EDIT_CAL_DATE.getMonth() - 1); renderEditCalendar(); }
function nextEditMonth() { EDIT_CAL_DATE.setMonth(EDIT_CAL_DATE.getMonth() + 1); renderEditCalendar(); }

function selectEditDate(ds) {
  EDIT_CAL_SELECTED = ds;

function groupFormsByAgentMonth(forms) {
  var agentMap = {};
  forms.forEach(function (f) {
    var aname = f.AgentName || 'Unknown';
    if (!agentMap[aname]) agentMap[aname] = { agentName: aname, months: {}, totalForms: 0 };
    agentMap[aname].totalForms++;
    var dateStr = f.EventDate || f.CreatedAt || '';
    var monthKey = dateStr.slice(0, 7);
    if (!monthKey) monthKey = 'unknown';
    if (!agentMap[aname].months[monthKey]) agentMap[aname].months[monthKey] = { key: monthKey, label: formatMonthLabel(monthKey), forms: [] };
    agentMap[aname].months[monthKey].forms.push(f);
  });
  var result = Object.keys(agentMap).sort().map(function (k) {
    var agent = agentMap[k];
    var months = Object.keys(agent.months).sort().reverse().map(function (mk) {
      var m = agent.months[mk];
      m.forms.sort(function (a, b) { return (b.EventDate || b.CreatedAt || '').localeCompare(a.EventDate || a.CreatedAt || ''); });
      return m;
    });
    return { agentName: agent.agentName, months: months, totalForms: agent.totalForms };
  });
  return result;
}

function formatMonthLabel(key) {
  if (key === 'unknown') return 'No date';
  var parts = key.split('-');
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var m = months[parseInt(parts[1], 10) - 1] || parts[1];
  return m + ' ' + parts[0];
}

function toggleMonth(monthId) {
  var strip = document.getElementById(monthId);
  var chevron = document.getElementById(monthId + '-chevron');
  if (!strip) return;
  if (strip.style.display === 'none') {
    strip.style.display = '';
    if (chevron) chevron.textContent = '▼';
  } else {
    strip.style.display = 'none';
    if (chevron) chevron.textContent = '▶';
  }
}

function formatDisplayDate(iso) {
  if (!iso) return '';
  var parts = iso.split('-');
  if (parts.length !== 3) return iso;
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return parseInt(parts[2],10) + ' ' + months[parseInt(parts[1],10)-1] + ' ' + parts[0];
}

function renderCalendar() {

  var today = new Date().toISOString().slice(0, 10);
  var html = '';
  var day = 1;
  for (var r = 0; r < 6; r++) {
    if (day > daysInMonth) break;
    html += '<tr>';
    for (var c = 0; c < 7; c++) {

        html += '<td></td>';
      } else {

        if (ds === CAL_SELECTED) cls += ' selected';

      }

  document.getElementById('cal-body').innerHTML = html;
}
